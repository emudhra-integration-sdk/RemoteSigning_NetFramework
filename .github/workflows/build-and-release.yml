name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build (Release)
        run: msbuild eMudhraRDSA.sln /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Stage release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item bin/Release/eMudhraRDSA.dll release/
          if (Test-Path bin/Release/eMudhraRDSA.pdb) { Copy-Item bin/Release/eMudhraRDSA.pdb release/ }
          Get-ChildItem release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: eMudhraRDSA
          path: release/*

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
